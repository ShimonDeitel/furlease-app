name: Furlease
options:
  bundleIdPrefix: com.shimondeitel.petlease
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furlease:
    type: application
    platform: iOS
    sources:
      - path: Furlease
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petlease
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furlease/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurleaseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurleaseTests
      - path: Furlease.storekit
    dependencies:
      - target: Furlease
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petlease.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurleaseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurleaseUITests
    dependencies:
      - target: Furlease
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petlease.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furlease:
    build:
      targets:
        Furlease: all
        FurleaseTests: [test]
        FurleaseUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furlease.storekit
    test:
      config: Debug
      storeKitConfiguration: Furlease.storekit
      targets:
        - FurleaseTests
        - FurleaseUITests
    archive:
      config: Release
